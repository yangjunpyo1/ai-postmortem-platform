name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: yp-ai-postmortem-frontend
  TF_STATE_BUCKET: yp-terraform-state-381492097392

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}"

      - name: Resolve API Gateway URL from Terraform output
        id: api
        working-directory: terraform
        run: |
          URL=$(terraform output -raw api_gateway_url)
          if [ -z "$URL" ]; then
            echo "terraform output에서 API Gateway URL을 가져올 수 없습니다" >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update config.json with live API URL
        run: |
          printf '{\n    "REACT_APP_API_URL": "%s"\n}\n' "${{ steps.api.outputs.url }}" > frontend/build/config.json

      - name: Sync build to S3
        run: |
          aws s3 sync frontend/build "s3://${{ env.S3_BUCKET }}" \
            --delete \
            --exclude "index.html" \
            --exclude "config.json"
          aws s3 cp frontend/build/index.html "s3://${{ env.S3_BUCKET }}/index.html" \
            --cache-control "no-cache"
          aws s3 cp frontend/build/config.json "s3://${{ env.S3_BUCKET }}/config.json" \
            --content-type "application/json" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ env.S3_BUCKET }}')]] | [0].Id" \
            --output text)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "S3 버킷 '${{ env.S3_BUCKET }}' 를 오리진으로 사용하는 CloudFront 배포를 찾을 수 없습니다" >&2
            exit 1
          fi
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
